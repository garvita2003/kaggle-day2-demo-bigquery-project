<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header>
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">BQ</div>
                    <div>
                        <h1>BigQuery Release Notes</h1>
                        <p class="subtitle">Stay updated with the latest Google Cloud BigQuery releases</p>
                    </div>
                </div>
                <div class="header-actions">
                    <!-- Export to CSV Button -->
                    <button id="export-csv-btn" class="btn btn-secondary" aria-label="Export to CSV" disabled>
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                        Export CSV
                    </button>
                    <!-- Refresh Button -->
                    <button id="refresh-btn" class="btn btn-primary" aria-label="Refresh Release Notes">
                        <span class="btn-text">Refresh</span>
                        <svg class="spinner" id="spinner" viewBox="0 0 50 50">
                            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                        </svg>
                    </button>
                    <!-- Light/Dark Mode Toggle Switch -->
                    <div class="theme-toggle-wrapper">
                        <span class="theme-icon sun-icon">☀️</span>
                        <label class="switch" for="theme-checkbox">
                            <input type="checkbox" id="theme-checkbox" aria-label="Toggle light and dark theme">
                            <span class="slider round"></span>
                        </label>
                        <span class="theme-icon moon-icon">🌙</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <main>
            <!-- Error Banner -->
            <div id="error-banner" class="error-banner hidden">
                <span class="error-message">Failed to load release notes. </span>
                <button id="error-retry-btn" class="retry-link">Retry Now</button>
            </div>

            <!-- Search & Filters Container -->
            <div class="search-container">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search release notes by keyword (e.g. JSON, Table, Partition)..." aria-label="Search release notes">
                    <button id="clear-search-btn" class="clear-search-btn hidden" aria-label="Clear Search">&times;</button>
                </div>
            </div>

            <!-- Notes Container -->
            <div id="notes-container" class="notes-grid">
                <!-- Skeleton loader cards -->
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </main>

        <!-- Toast Notification Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Tweet Modal / Editor -->
        <div id="tweet-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Compose Tweet</h2>
                    <button class="close-btn" id="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="preview-card-summary">
                        <span class="preview-label">Selected Note:</span>
                        <div id="modal-note-title" class="modal-note-title"></div>
                    </div>
                    <textarea id="tweet-textarea" rows="5" maxlength="280" placeholder="What's happening?"></textarea>
                    <div class="char-count-container">
                        <span id="char-count">0</span>/280
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="cancel-tweet">Cancel</button>
                    <button class="btn btn-twitter" id="submit-tweet">
                        <svg class="twitter-icon" viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                        </svg>
                        Tweet
                    </button>
                </div>
            </div>
        </div>

        <footer>
            <p>BigQuery Release Notes Viewer &copy; 2026. Built with Python Flask & Vanilla CSS/JS.</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
